basePath: /
definitions:
  api.AddressBuildRequest:
    properties:
      network:
        enum:
        - mainnet
        - testnet
        type: string
      paymentKey:
        description: bech32-encoded verification key (required for base and enterprise
          address types)
        type: string
      stakeKey:
        description: bech32-encoded verification key (required for base and reward
          address types)
        type: string
      type:
        description: 'defaults to "base" - determines which keys are required: base
          requires both paymentKey and stakeKey, enterprise requires paymentKey only,
          reward requires stakeKey only'
        enum:
        - base
        - enterprise
        - reward
        type: string
    required:
    - network
    type: object
  api.AddressBuildResponse:
    properties:
      address:
        type: string
      network:
        type: string
      type:
        type: string
    type: object
  api.AddressEnumerateRequest:
    properties:
      account:
        maximum: 2147483647
        type: integer
      count:
        maximum: 1000
        minimum: 1
        type: integer
      mnemonic:
        type: string
      network:
        enum:
        - mainnet
        - preprod
        - preview
        type: string
      password:
        type: string
      start:
        maximum: 2147483647
        type: integer
    required:
    - count
    - mnemonic
    - network
    type: object
  api.AddressParseRequest:
    properties:
      address:
        type: string
    required:
    - address
    type: object
  api.AddressParseResponse:
    properties:
      address:
        type: string
      byron:
        $ref: '#/definitions/api.ByronAddressInfo'
      network:
        type: string
      payment:
        $ref: '#/definitions/api.CredentialInfo'
      pointer:
        $ref: '#/definitions/api.PointerInfo'
      stake:
        $ref: '#/definitions/api.CredentialInfo'
      type:
        type: string
      typeDescription:
        type: string
    type: object
  api.ByronAddressInfo:
    properties:
      type:
        description: '"pubkey", "script", or "redeem"'
        type: string
    type: object
  api.CredentialInfo:
    properties:
      bech32:
        description: bech32-encoded credential
        type: string
      hex:
        description: hex-encoded credential
        type: string
      type:
        description: '"key" or "script"'
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        type: string
      fields:
        additionalProperties:
          type: string
        type: object
    type: object
  api.PointerInfo:
    properties:
      certIndex:
        type: integer
      slot:
        format: int64
        type: integer
      txIndex:
        type: integer
    type: object
  api.ScriptAddressRequest:
    properties:
      network:
        enum:
        - mainnet
        - testnet
        type: string
      script:
        additionalProperties: {}
        type: object
    required:
    - network
    - script
    type: object
  api.ScriptAddressResponse:
    properties:
      address:
        type: string
      network:
        type: string
      scriptHash:
        type: string
    type: object
  api.ScriptCreateRequest:
    properties:
      key_hashes:
        items:
          type: string
        minItems: 1
        type: array
      network:
        enum:
        - mainnet
        - testnet
        type: string
      required:
        minimum: 1
        type: integer
      timelock_after:
        format: int64
        type: integer
      timelock_before:
        format: int64
        type: integer
      type:
        enum:
        - nOf
        - all
        - any
        type: string
    required:
    - key_hashes
    - network
    - type
    type: object
  api.ScriptResponse:
    properties:
      address:
        type: string
      script:
        additionalProperties: {}
        type: object
      scriptHash:
        type: string
      type:
        type: string
    type: object
  api.ScriptValidateRequest:
    properties:
      require_signatures:
        type: boolean
      script:
        additionalProperties: {}
        type: object
      signatures:
        items:
          type: string
        type: array
      slot:
        format: int64
        type: integer
    required:
    - script
    type: object
  api.ScriptValidateResponse:
    properties:
      scriptHash:
        type: string
      signatures:
        type: integer
      slot:
        format: int64
        type: integer
      valid:
        type: boolean
    type: object
  api.SignDataRequest:
    properties:
      address:
        type: string
      payload:
        type: string
      signing_key:
        type: string
    required:
    - address
    - payload
    - signing_key
    type: object
  api.SignDataResponse:
    properties:
      key:
        type: string
      signature:
        type: string
    type: object
  api.TxAssembleRequest:
    properties:
      tx_cbor:
        description: raw hex CBOR or JSON text envelope
        type: string
      witnesses:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - tx_cbor
    - witnesses
    type: object
  api.TxCborResponse:
    properties:
      tx_cbor:
        type: string
      tx_id:
        type: string
    type: object
  api.TxDecodeRequest:
    properties:
      tx_cbor:
        description: raw hex CBOR or JSON text envelope
        type: string
    required:
    - tx_cbor
    type: object
  api.TxIDRequest:
    properties:
      tx_cbor:
        description: raw hex CBOR or JSON text envelope
        type: string
    required:
    - tx_cbor
    type: object
  api.TxIDResponse:
    properties:
      tx_id:
        type: string
    type: object
  api.TxSignRequest:
    properties:
      signing_keys:
        items:
          type: string
        minItems: 1
        type: array
      tx_cbor:
        description: raw hex CBOR or JSON text envelope
        type: string
    required:
    - signing_keys
    - tx_cbor
    type: object
  api.TxWitnessRequest:
    properties:
      signing_key:
        type: string
      tx_cbor:
        description: raw hex CBOR or JSON text envelope
        type: string
    required:
    - signing_key
    - tx_cbor
    type: object
  api.TxWitnessResponse:
    properties:
      witness:
        type: string
    type: object
  api.VerifyDataRequest:
    properties:
      key:
        type: string
      payload:
        type: string
      signature:
        type: string
    required:
    - key
    - payload
    - signature
    type: object
  api.VerifyDataResponse:
    properties:
      valid:
        type: boolean
    type: object
  api.WalletDeleteRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        type: string
    required:
    - name
    type: object
  api.WalletGetRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        type: string
    required:
    - name
    type: object
  api.WalletRestoreRequest:
    properties:
      account_id:
        maximum: 2147483647
        type: integer
      address_id:
        maximum: 2147483647
        type: integer
      committee_cold_id:
        maximum: 2147483647
        type: integer
      committee_hot_id:
        maximum: 2147483647
        type: integer
      drep_id:
        maximum: 2147483647
        type: integer
      mnemonic:
        minLength: 1
        type: string
      password:
        type: string
      payment_id:
        maximum: 2147483647
        type: integer
      pool_cold_id:
        maximum: 2147483647
        type: integer
      stake_id:
        maximum: 2147483647
        type: integer
    required:
    - mnemonic
    type: object
  api.WalletUpdateRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        type: string
    required:
    - name
    type: object
  bursa.EnumeratedAddress:
    properties:
      address:
        type: string
      index:
        type: integer
    type: object
  bursa.KeyFile:
    properties:
      cborHex:
        type: string
      description:
        type: string
      type:
        type: string
    type: object
  bursa.TxInput:
    properties:
      index:
        type: integer
      tx_id:
        type: string
    type: object
  bursa.TxInspection:
    properties:
      certificate_count:
        type: integer
      era:
        type: string
      fee:
        type: string
      has_metadata:
        type: boolean
      has_mint:
        type: boolean
      inputs:
        items:
          $ref: '#/definitions/bursa.TxInput'
        type: array
      is_valid:
        type: boolean
      native_scripts:
        type: integer
      outputs:
        items:
          $ref: '#/definitions/bursa.TxOutput'
        type: array
      required_signers:
        type: integer
      size_bytes:
        type: integer
      ttl:
        type: integer
      tx_id:
        type: string
      validity_interval_start:
        type: integer
      vkey_witnesses:
        type: integer
      withdrawal_count:
        type: integer
    type: object
  bursa.TxOutput:
    properties:
      address:
        type: string
      lovelace:
        type: string
    type: object
  bursa.Wallet:
    properties:
      committee_cold_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      committee_cold_skey:
        $ref: '#/definitions/bursa.KeyFile'
      committee_cold_vkey:
        $ref: '#/definitions/bursa.KeyFile'
      committee_hot_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      committee_hot_skey:
        $ref: '#/definitions/bursa.KeyFile'
      committee_hot_vkey:
        $ref: '#/definitions/bursa.KeyFile'
      drep_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      drep_skey:
        $ref: '#/definitions/bursa.KeyFile'
      drep_vkey:
        $ref: '#/definitions/bursa.KeyFile'
      mnemonic:
        example: abandon abandon abandon abandon abandon abandon abandon abandon abandon
          abandon abandon about
        type: string
      payment_address:
        example: addr1qxqs59lphg8g6qndelq8xwqn60ag3aeyfcp33c2kdp46a429mg32v29q3cg4sdj5c9ts5vxknc0yutnj8x8r8qy2l2q9sgds2
        type: string
      payment_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      payment_skey:
        $ref: '#/definitions/bursa.KeyFile'
      payment_vkey:
        $ref: '#/definitions/bursa.KeyFile'
      pool_cold_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      pool_cold_skey:
        $ref: '#/definitions/bursa.KeyFile'
      pool_cold_vkey:
        $ref: '#/definitions/bursa.KeyFile'
      stake_address:
        example: stake1uy9ggsc9qls4pu9qvyyacwnmr9tt0gzcdt5s0zj4au8qkqc65ge8t
        type: string
      stake_extended_skey:
        $ref: '#/definitions/bursa.KeyFile'
      stake_skey:
        $ref: '#/definitions/bursa.KeyFile'
      stake_vkey:
        $ref: '#/definitions/bursa.KeyFile'
    type: object
info:
  contact:
    email: support@blinklabs.io
    name: Blink Labs
    url: https://blinklabs.io
  description: Programmable Cardano Wallet API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: bursa
  version: v0
paths:
  /api/address/build:
    post:
      consumes:
      - application/json
      description: Builds a Cardano address from verification keys
      parameters:
      - description: Address Build Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.AddressBuildRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Address built successfully
          schema:
            $ref: '#/definitions/api.AddressBuildResponse'
        "400":
          description: Invalid request or keys
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Build Cardano address
  /api/address/enumerate:
    post:
      consumes:
      - application/json
      description: Derives consecutive base addresses from a mnemonic for the given
        account and network
      parameters:
      - description: Address Enumerate Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.AddressEnumerateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Enumerated addresses
          schema:
            items:
              $ref: '#/definitions/bursa.EnumeratedAddress'
            type: array
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Enumerate derived addresses for a wallet
  /api/address/parse:
    post:
      consumes:
      - application/json
      description: Parses a Cardano address and returns its components and metadata
      parameters:
      - description: Address Parse Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.AddressParseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Address parsed successfully
          schema:
            $ref: '#/definitions/api.AddressParseResponse'
        "400":
          description: Invalid request or address
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Parse Cardano address
  /api/script/address:
    post:
      consumes:
      - application/json
      description: Generate an address for a script on the specified network
      parameters:
      - description: Script Address Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ScriptAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Script address generated
          schema:
            $ref: '#/definitions/api.ScriptAddressResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Generate script address
  /api/script/create:
    post:
      consumes:
      - application/json
      description: Create a new multi-signature script with the specified parameters
      parameters:
      - description: Script Create Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ScriptCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Script successfully created
          schema:
            $ref: '#/definitions/api.ScriptResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a multi-signature script
  /api/script/validate:
    post:
      consumes:
      - application/json
      description: Validate a script's structure and requirements
      parameters:
      - description: Script Validate Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ScriptValidateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Script validation result
          schema:
            $ref: '#/definitions/api.ScriptValidateResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Validate a script
  /api/sign/data:
    post:
      consumes:
      - application/json
      description: Sign a payload using a signing key, producing a COSE_Sign1 structure
      parameters:
      - description: Sign Data Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SignDataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: COSE_Sign1 signature and COSE_Key
          schema:
            $ref: '#/definitions/api.SignDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Sign a message (CIP-8/CIP-30 signData)
  /api/sign/verify:
    post:
      consumes:
      - application/json
      description: Verify a COSE_Sign1 signature against a COSE_Key and expected payload
      parameters:
      - description: Verify Data Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.VerifyDataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification result
          schema:
            $ref: '#/definitions/api.VerifyDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Verify a CIP-8/CIP-30 signData signature
  /api/tx/assemble:
    post:
      consumes:
      - application/json
      description: Merge detached witnesses into a transaction
      parameters:
      - description: Transaction + witnesses
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TxAssembleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Assembled signed transaction
          schema:
            $ref: '#/definitions/api.TxCborResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Assemble a signed transaction
  /api/tx/decode:
    post:
      consumes:
      - application/json
      description: Decode and inspect a transaction
      parameters:
      - description: Transaction
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TxDecodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bursa.TxInspection'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Decode a transaction
  /api/tx/id:
    post:
      consumes:
      - application/json
      description: Calculate the transaction id from a transaction body
      parameters:
      - description: Transaction
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TxIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Transaction id
          schema:
            $ref: '#/definitions/api.TxIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get a transaction id
  /api/tx/sign:
    post:
      consumes:
      - application/json
      description: Add vkey witnesses for the provided signing keys (body preserved)
      parameters:
      - description: Transaction + signing keys
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TxSignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Signed transaction
          schema:
            $ref: '#/definitions/api.TxCborResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Sign a transaction
  /api/tx/witness:
    post:
      consumes:
      - application/json
      description: Produce a detached vkey witness for a transaction body
      parameters:
      - description: Transaction + signing key
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TxWitnessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Detached witness
          schema:
            $ref: '#/definitions/api.TxWitnessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Produce a transaction witness
  /api/wallet/create:
    get:
      description: Create a wallet and return details
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            $ref: '#/definitions/bursa.Wallet'
      summary: Create a wallet
  /api/wallet/delete:
    post:
      consumes:
      - application/json
      description: Deletes a wallet from persistent storage and optional password.
      parameters:
      - description: Wallet Delete Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.WalletDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Wallet successfully deleted
          schema:
            type: string
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete wallet from persistent storage
  /api/wallet/get:
    post:
      consumes:
      - application/json
      description: Gets a wallet from persistent storage and optional password and
        returns wallet details.
      parameters:
      - description: Wallet Restore Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.WalletGetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Wallet successfully loaded
          schema:
            $ref: '#/definitions/bursa.Wallet'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get wallet from persistent storage
  /api/wallet/list:
    get:
      description: List all wallets stored in secret storage matching our prefix
      produces:
      - application/json
      responses:
        "200":
          description: Ok
          schema:
            items:
              type: string
            type: array
      summary: Lists wallets
  /api/wallet/restore:
    post:
      consumes:
      - application/json
      description: Restores a wallet using the provided mnemonic seed phrase and optional
        password and returns wallet details.
      parameters:
      - description: Wallet Restore Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.WalletRestoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Wallet successfully restored
          schema:
            $ref: '#/definitions/bursa.Wallet'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Restore a wallet using a mnemonic seed phrase
  /api/wallet/update:
    post:
      consumes:
      - application/json
      description: Updates a wallet from persistent storage and optional password
        and returns wallet details.
      parameters:
      - description: Wallet Update Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.WalletUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Wallet successfully updated
          schema:
            type: string
        "400":
          description: Invalid request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update a wallet in persistent storage
schemes:
- http
swagger: "2.0"

name: ui

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 22
      - name: npm ci
        run: npm ci
      - name: lint
        run: npm run lint
      - name: type-check
        run: npm run type-check
      - name: test
        run: npm run test
      - name: build
        run: npm run build

  ui-go:
    name: ui-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 22
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: 1.26.x
      # Build the web bundle first so the //go:embed dist target is populated
      # before the Go module is built/tested.
      - name: Build web bundle
        run: cd ui/web && npm ci && npm run build
      # Scope to the module's real Go roots (cmd + internal). A repo-wide "./..."
      # would descend into ui/web/node_modules, where the npm "flatted" package
      # vendors a stray *.go file; Go's "..." wildcard does not skip node_modules,
      # so on a clean checkout that package breaks module resolution
      # ("updates to go.mod needed"). The wallet's Go code lives only under
      # cmd/ and internal/.
      - name: go vet
        run: cd ui && go vet ./cmd/... ./internal/...
      - name: go test
        run: cd ui && go test ./cmd/... ./internal/...
      - name: go build
        run: cd ui && go build ./cmd/bursa-wallet

  ui-lint:
    name: ui-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 22
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: 1.26.x
      # golangci-lint needs the embedded dist to type-check the webui package,
      # so build the web bundle before linting the nested module.
      - name: Build web bundle
        run: cd ui/web && npm ci && npm run build
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0 https://github.com/golangci/golangci-lint-action/releases/tag/v9.3.0
        with:
          working-directory: ui
          # Scope to the module's real Go roots. A default "./..." load descends
          # into ui/web/node_modules, where the npm "flatted" package vendors a
          # stray *.go file; Go's "..." wildcard does not skip node_modules, so on
          # a clean checkout golangci-lint fails to load the package graph
          # ("no go files to analyze: running `go mod tidy` may solve the problem").
          args: ./cmd/... ./internal/...
